name: Bug Report
description: Report a bug in gitstow
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: gitstow version
      description: "Run `gitstow --version` to find this."
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or steps to reproduce the behavior.
      placeholder: |
        1. Run `gitstow add ...`
        2. Run `gitstow pull`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste any error messages or terminal output.
      render: shell
