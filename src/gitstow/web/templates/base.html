<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gitstow{% block title_suffix %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  {% block head_extra %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
  <header class="site">
    <div class="container">
      <nav class="primary">
        <div class="brand">
          <span class="live-pulse" title="Connected"></span>
          <span class="mark">gitstow</span>
          <span class="tagline">library.mgr · v{{ version }}</span>
        </div>
        <ul class="links">
          <li><a href="/"{% if page == "dashboard" %} class="active"{% endif %}>Library</a></li>
          <li><a href="/workspaces"{% if page == "workspaces" %} class="active"{% endif %}>Workspaces</a></li>
          <li><a href="/settings"{% if page == "settings" %} class="active"{% endif %}>Settings</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container"{% block container_style %}{% endblock %}>
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site">
    <div class="container footer-inner">
      <div>
        <span class="dot green"></span>
        <span class="live-label">live</span>
        <code style="margin-left: 0.6rem;">{{ server_addr }}</code>
      </div>
      <button class="btn btn-ghost btn-sm"
              hx-post="/shutdown"
              hx-swap="outerHTML"
              hx-confirm="Shut down the gitstow server?">Shutdown</button>
    </div>
  </footer>

  {% block body_extra %}{% endblock %}
</body>
</html>
