<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gitstow</title>
  <link rel="stylesheet" href="../static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
  <header class="site">
    <div class="container">
      <nav class="primary">
        <div class="brand">
          <span class="live-pulse" title="Connected"></span>
          <span class="mark">gitstow</span>
          <span class="tagline">library.mgr · v0.2.0</span>
        </div>
        <ul class="links">
          <li><a href="dashboard.html">Library</a></li>
          <li><a href="workspaces.html">Workspaces</a></li>
          <li><a href="settings.html">Settings</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="hero">
        <div class="hero-left">
          <div class="eyebrow"><span class="bar"></span>Layout shell</div>
          <h1>The <span class="ember">chrome</span>.</h1>
          <p class="lede">Common header and footer used by every page. Open <a href="dashboard.html">Library</a> to see the main view.</p>
        </div>
      </section>
    </div>
  </main>

  <footer class="site">
    <div class="container footer-inner">
      <div>
        <span class="dot green"></span>
        <span class="live-label">live</span>
        <code style="margin-left: 0.6rem;">127.0.0.1:7853</code>
      </div>
      <button class="btn btn-ghost btn-sm"
              hx-post="/shutdown"
              hx-confirm="Shut down the gitstow server?"
              onclick="alert('Phase A mock — wires up in Phase B')">Shutdown</button>
    </div>
  </footer>
